version: '3.8'

services:
  postgres :
    image : postgres:15
    container_name: notif_postgress
    environment :
      POSTGRES_USER : avish 
      POSTGRES_PASSWORD : password123
      POSTGRES_DB : notification_db
    ports : 
    - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis: 
    image: redis:7
    container_name: notif_redis
    ports:
      - '6379:6379'

volumes :
    postgres_data : 